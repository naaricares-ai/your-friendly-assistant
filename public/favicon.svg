<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D4FF;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#7B61FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF00FF;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="100" height="100" rx="20" fill="#0A0A0F"/>
  <g filter="url(#glow)">
    <!-- CPU chip shape -->
    <rect x="25" y="25" width="50" height="50" rx="8" fill="none" stroke="url(#grad)" stroke-width="3"/>
    <!-- Inner circuit -->
    <rect x="35" y="35" width="30" height="30" rx="4" fill="url(#grad)" opacity="0.3"/>
    <circle cx="50" cy="50" r="8" fill="url(#grad)"/>
    <!-- Connection pins -->
    <line x1="30" y1="15" x2="30" y2="25" stroke="url(#grad)" stroke-width="3" stroke-linecap="round"/>
    <line x1="50" y1="15" x2="50" y2="25" stroke="url(#grad)" stroke-width="3" stroke-linecap="round"/>
    <line x1="70" y1="15" x2="70" y2="25" stroke="url(#grad)" stroke-width="3" stroke-linecap="round"/>
    <line x1="30" y1="75" x2="30" y2="85" stroke="url(#grad)" stroke-width="3" stroke-linecap="round"/>
    <line x1="50" y1="75" x2="50" y2="85" stroke="url(#grad)" stroke-width="3" stroke-linecap="round"/>
    <line x1="70" y1="75" x2="70" y2="85" stroke="url(#grad)" stroke-width="3" stroke-linecap="round"/>
    <line x1="15" y1="30" x2="25" y2="30" stroke="url(#grad)" stroke-width="3" stroke-linecap="round"/>
    <line x1="15" y1="50" x2="25" y2="50" stroke="url(#grad)" stroke-width="3" stroke-linecap="round"/>
    <line x1="15" y1="70" x2="25" y2="70" stroke="url(#grad)" stroke-width="3" stroke-linecap="round"/>
    <line x1="75" y1="30" x2="85" y2="30" stroke="url(#grad)" stroke-width="3" stroke-linecap="round"/>
    <line x1="75" y1="50" x2="85" y2="50" stroke="url(#grad)" stroke-width="3" stroke-linecap="round"/>
    <line x1="75" y1="70" x2="85" y2="70" stroke="url(#grad)" stroke-width="3" stroke-linecap="round"/>
  </g>
</svg>